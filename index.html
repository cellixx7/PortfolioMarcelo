<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcelo V. | Dev FullStack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Parallax Background -->
    <div class="parallax-bg"></div>
    
    <!-- Background Waves -->
    <div class="background-effects">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- Main Content Container -->
    <main class="container">
        <!-- Header Section -->
        <header class="header">
            <p class="cursor typewriter-animation" style="--typing-speed: 5s; --text-width: 24em;">
                Marcelo Vaz Oliveira, Dev e Designer Web!
            </p>
        </header>

        <!-- Navigation Menu -->
        <nav class="menu" style="--menu-position-y: 20vh">
            <ul>
                <li style="--i:#a955ff;--j:#ea51ff;--hover-width:180px">
                    <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
                    <span class="title">Home</span>
                </li>
                <li style="--i:#56CCF2;--j:#2F80ED;--hover-width:180px">
                    <span class="icon"><ion-icon name="videocam-outline"></ion-icon></span>
                    <span class="title">Video</span>
                </li>
                <li style="--i:#FF9966;--j:#FF5E62;--hover-width:180px">
                    <span class="icon"><ion-icon name="camera-outline"></ion-icon></span>
                    <span class="title">Photo</span>
                </li>
                <li style="--i:#80FF72;--j:#7EE8FA;--hover-width:180px">
                    <span class="icon"><ion-icon name="share-social-outline"></ion-icon></span>
                    <span class="title">Share</span>
                </li>
                <li style="--i:#ffa9c6;--j:#f434e2;--hover-width:180px">
                    <span class="icon"><ion-icon name="heart-outline"></ion-icon></span>
                    <span class="title">Like</span>
                </li>
            </ul>
        </nav>

        <!-- Card Section -->
        <section class="cards-section" style="--cards-position-y: 40vh">
            <div class="card">
                <div class="card-inner">
                    <div class="card-front">Front Side</div>
                    <div class="card-back">Back Side</div>
                </div>
            </div>
        </section>

        <!-- Additional sections for scrollable content -->
        <section class="content-section" style="--section-margin: 100vh">
            <div class="section-content">
                <!-- Add your content here -->
            </div>
        </section>

        <section class="content-section" style="--section-margin: 50vh">
            <div class="section-content">
                <!-- Add your content here -->
            </div>
        </section>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="script.js"></script>
</body>
</html>
