                    <h2>Fale comigo</h2>

                    <label for="subject">Assunto</label>
                    <input type="text" id="subject" name="user_subject" placeholder="Opcional">

                    <label for="message">Mensagem</label>
                    <textarea id="message" name="user_message" rows="5" placeholder="Digite sua mensagem..." required></textarea>

                    <button type="submit" class="btn bubbly" style="margin-top: 1.5rem; width: 100%;">Enviar Mensagem</button>
                </form>
